name: Deploy to GitHub Pages

on:
  # Deploy on every push to main.
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the tokens the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          # Optional: set these as repo variables/secrets to enable Cloudinary
          # image delivery. Unset simply serves image srcs as-authored.
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # `output: 'export'` writes the static site here.
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
